services:
  - type: web
    name: splitwise-backend
    env: node
    buildCommand: "cd backend && npm install && npm run build && npm run db:migrate"
    startCommand: "node backend/dist/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: splitwise-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://splitwise-lpu.vercel.app

databases:
  - name: splitwise-db
    databaseName: splitwise
    user: splitwise
    plan: free
